<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register | MicroWealth AI</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", Roboto, Arial, sans-serif;
}

body {
    min-height: 100vh;
    background: linear-gradient(135deg, #00ff99, #0072ff);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #e5e7eb;
}

form {
    width: 100%;
    max-width: 420px;
    background: rgba(255, 255, 255, 0.06);
    backdrop-filter: blur(14px);
    padding: 38px 32px;
    border-radius: 18px;
    box-shadow: 0 25px 55px rgba(0, 0, 0, 0.5);
    animation: fadeUp 0.5s ease;
}

h2 {
    text-align: center;
    margin-bottom: 26px;
    font-size: 2rem;
    color: #dfe8ec;
    letter-spacing: 0.6px;
}

input[type="text"],
input[type="email"],
input[type="password"] {
    width: 100%;
    padding: 14px 16px;
    border-radius: 10px;
    border: 1px solid rgba(255, 255, 255, 0.15);
    background: rgba(15, 23, 42, 0.9);
    color: #e5e7eb;
    font-size: 0.95rem;
    margin-bottom: 16px;
}

input::placeholder {
    color: #9ca3af;
}

input:focus {
    outline: none;
    border-color: #38bdf8;
    box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.28);
}

.password-container {
    position: relative;
}

.password-container i {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    color: #9ca3af;
}

button {
    width: 100%;
    padding: 15px;
    margin-top: 6px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, #00ff99, #0072ff);
    color: #020617;
    font-weight: 700;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.3s ease;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 14px 28px rgba(56, 189, 248, 0.4);
}

button:active {
    transform: translateY(0);
}

#message {
    margin-top: 18px;
    text-align: center;
    font-size: 0.9rem;
    min-height: 20px;
    transition: all 0.3s ease;
}

#message.success { color: #22c55e; }
#message.error { color: #ef4444; }

.auth-footer {
    text-align: center;
    margin-top: 14px;
}

.auth-footer a {
    color: #38bdf8;
    font-weight: bold;
}

.strength {
    height: 6px;
    border-radius: 5px;
    background: #eee;
    margin-bottom: 16px;
}

.strength-fill {
    height: 100%;
    width: 0%;
    border-radius: 5px;
    transition: 0.3s;
}

@keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<form id="registerForm">
    <h2>Create Account</h2>

    <input type="text" id="full_name" placeholder="Full Name" required>
    <input type="email" id="email" placeholder="Email" required>

    <div class="password-container">
        <input type="password" id="password" placeholder="Password" required>
        <i class="fas fa-eye" id="togglePassword"></i>
    </div>

    <div class="password-container">
        <input type="password" id="confirm_password" placeholder="Confirm Password" required>
        <i class="fas fa-eye" id="toggleConfirmPassword"></i>
    </div>

    <div class="strength">
        <div class="strength-fill" id="strengthFill"></div>
    </div>

    <button type="submit" id="registerBtn">Register</button>

    <p class="auth-footer">Already have an account? <a href="login.html">Login here</a></p>

    <p id="message"></p>
</form>

<script>
    const API_URL = "https://microwealthapp-production.up.railway.app";
// Show/Hide Password
const togglePassword = document.getElementById("togglePassword");
const password = document.getElementById("password");
togglePassword.addEventListener("click", () => {
    const type = password.type === "password" ? "text" : "password";
    password.type = type;
    togglePassword.classList.toggle("fa-eye-slash");
});

const toggleConfirmPassword = document.getElementById("toggleConfirmPassword");
const confirmPassword = document.getElementById("confirm_password");
toggleConfirmPassword.addEventListener("click", () => {
    const type = confirmPassword.type === "password" ? "text" : "password";
    confirmPassword.type = type;
    toggleConfirmPassword.classList.toggle("fa-eye-slash");
});

// Password Strength Meter
const strengthFill = document.getElementById("strengthFill");
password.addEventListener("input", () => {
    const val = password.value;
    let strength = 0;
    if (val.length >= 6) strength += 25;
    if (/[A-Z]/.test(val)) strength += 25;
    if (/[0-9]/.test(val)) strength += 25;
    if (/[^A-Za-z0-9]/.test(val)) strength += 25;
    strengthFill.style.width = strength + "%";
    if (strength < 50) strengthFill.style.background = "red";
    else if (strength < 75) strengthFill.style.background = "orange";
    else strengthFill.style.background = "#22c55e";
});

// Submit Form
document.getElementById("registerForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const message = document.getElementById("message");

    const full_name = document.getElementById("full_name").value.trim();
    const email = document.getElementById("email").value.trim();
    const passwordVal = password.value.trim();
    const confirmVal = confirmPassword.value.trim();

    if (passwordVal !== confirmVal) {
        message.textContent = "Passwords do not match!";
        message.className = "error";
        return;
    }

    message.textContent = "Registering...";
    message.className = "";

    try {
        const res = await fetch(`${API_URL}/register`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ full_name, email, password: passwordVal })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || "Registration failed");

        message.textContent = "Registration successful! Redirecting...";
        message.className = "success";
        setTimeout(() => window.location.href = "login.html", 1500);

    } catch (err) {
        message.textContent = err.message;
        message.className = "error";
    }
});
</script>

</body>
</html>
