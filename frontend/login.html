<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | MicroWealth AI</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4CAF50, #00c6ff);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 350px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        .password-container {
            position: relative;
        }

        .password-container i {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #777;
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: #4CAF50;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
        }

        .btn-login:disabled {
            background: #999;
        }

        .message {
            margin-top: 10px;
            text-align: center;
        }

        .error { color: red; }
        .success { color: green; }
    </style>
</head>
<body>

<div class="login-container">
    <h2>Login</h2>

    <form id="loginForm">

        <div class="form-group">
            <input type="email" id="email" placeholder="Email" required>
        </div>

        <div class="form-group password-container">
            <input type="password" id="password" placeholder="Password" required>
            <i class="fas fa-eye" id="togglePassword"></i>
        </div>

        <button type="submit" id="loginBtn" class="btn-login">
            Login
        </button>

        <div class="auth-footer">
    <p>Don’t have an account?</p>
    <a href="register.html" class="btn-register">Create Account</a>
    </div>
    </form>
</div>
<style>
    .btn-register {
    display: inline-block;
    margin-top: 8px;
    padding: 8px 15px;
    background: transparent;
    border: 2px solid #4CAF50;
    border-radius: 8px;
    color: #4CAF50;
    text-decoration: none;
    transition: 0.3s;
}

.btn-register:hover {
    background: #4CAF50;
    color: white;
}
</style>
<script src="/static/login.js"></script>
</body>
</html>
