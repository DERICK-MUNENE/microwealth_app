<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Financial History | MicroWealth AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/dashboard.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<!-- HEADER -->
<header class="header">
    <nav class="navbar">
        <div class="logo">
            <i class="fas fa-chart-line"></i>
            <span>MicroWealth AI</span>
        </div>
        <ul class="nav-menu">
            <li><a href="dashboard.html"><i class="fas fa-arrow-left"></i> Dashboard</a></li>
            <li class="user-info">
                <button onclick="logout()" class="btn-logout">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </li>
        </ul>
    </nav>
</header>

<!-- MAIN -->
<main class="content" style="margin-left:0;">
    <div class="content-header">
        <h1><i class="fas fa-history"></i> Financial History</h1>
    </div>

    <div class="card">
        <div class="table-container">
            <table class="history-table">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Income</th>
                        <th>Expenses</th>
                        <th>Savings</th>
                        <th>Disposable</th>
                        <th>Risk</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="historyTable">
                    <tr>
                        <td colspan="7">Loading...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<script src="/static/auth.js"></script>
<script src="/static/history.js"></script>
</body>
</html>
